name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Lint
        run: make lint

      - name: Build release assets
        run: make package

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CmdTabUltra-universal.zip
            dist/CmdTabUltra-*.dmg
            dist/CmdTabUltra-*.pkg
